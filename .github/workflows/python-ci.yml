name: Python CI/CD

on:
  push:
    branches: [ main, master, lab03 ]
    paths:
      - 'app_python/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'app_python/**'
      - '.github/workflows/python-ci.yml'

env:
  PYTHON_VERSION: '3.12'
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-info-service

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            app_python/requirements.txt
            app_python/requirements-dev.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_python/requirements.txt
          pip install -r app_python/requirements-dev.txt
          pip install pylint
      
      - name: Lint with pylint
        run: |
          pylint app_python/app.py --disable=C0114,C0116,R0903 || true
        continue-on-error: true
      
      - name: Run tests with coverage
        run: |
          cd app_python
          pytest --cov=. --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./app_python/coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app_python/requirements.txt

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/lab03')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Generate version tags
        id: meta
        run: |
          # Calendar Versioning (CalVer) - YYYY.MM.DD format
          CALVER=$(date +%Y.%m.%d)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # Build number from GitHub run number
          BUILD_NUM=${{ github.run_number }}
          
          echo "calver=${CALVER}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_num=${BUILD_NUM}" >> $GITHUB_OUTPUT
          
          # Generate tags
          TAGS="${{ env.DOCKER_IMAGE }}:${CALVER}"
          TAGS="${TAGS},${{ env.DOCKER_IMAGE }}:${CALVER}.${BUILD_NUM}"
          TAGS="${TAGS},${{ env.DOCKER_IMAGE }}:sha-${SHORT_SHA}"
          TAGS="${TAGS},${{ env.DOCKER_IMAGE }}:latest"
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          
          echo "📦 Generated tags:"
          echo "  - ${CALVER} (CalVer date)"
          echo "  - ${CALVER}.${BUILD_NUM} (CalVer with build)"
          echo "  - sha-${SHORT_SHA} (Git commit)"
          echo "  - latest (rolling)"
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app_python
          file: ./app_python/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.calver }}
      
      - name: Image digest
        run: echo "🐳 Image pushed successfully with multiple tags!"
