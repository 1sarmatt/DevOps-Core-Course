name: Go CI/CD

on:
  push:
    branches: [ main, master, lab03 ]
    paths:
      - 'app_go/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'app_go/**'
      - '.github/workflows/go-ci.yml'

env:
  GO_VERSION: '1.21'
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-info-service-go

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: app_go/go.mod
      
      - name: Install dependencies
        working-directory: ./app_go
        run: |
          go mod download
          go mod verify
      
      - name: Run go vet
        working-directory: ./app_go
        run: go vet ./...
      
      - name: Run go fmt check
        working-directory: ./app_go
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -d .
            exit 1
          fi
      
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      
      - name: Run golangci-lint
        working-directory: ./app_go
        run: golangci-lint run --timeout=5m || true
        continue-on-error: true
      
      - name: Build application
        working-directory: ./app_go
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -v -o devops-info-service .
      
      - name: Run tests (if any)
        working-directory: ./app_go
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./app_go/coverage.out
          flags: go
          name: go-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/golang@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app_go/go.mod

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/lab03')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Generate version tags
        id: meta
        run: |
          # Calendar Versioning (CalVer) - YYYY.MM.DD format
          CALVER=$(date +%Y.%m.%d)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # Build number from GitHub run number
          BUILD_NUM=${{ github.run_number }}
          
          echo "calver=${CALVER}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_num=${BUILD_NUM}" >> $GITHUB_OUTPUT
          
          # Generate tags
          TAGS="${{ env.DOCKER_IMAGE }}:${CALVER}"
          TAGS="${TAGS},${{ env.DOCKER_IMAGE }}:${CALVER}.${BUILD_NUM}"
          TAGS="${TAGS},${{ env.DOCKER_IMAGE }}:sha-${SHORT_SHA}"
          TAGS="${TAGS},${{ env.DOCKER_IMAGE }}:latest"
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          
          echo "📦 Generated tags:"
          echo "  - ${CALVER} (CalVer date)"
          echo "  - ${CALVER}.${BUILD_NUM} (CalVer with build)"
          echo "  - sha-${SHORT_SHA} (Git commit)"
          echo "  - latest (rolling)"
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app_go
          file: ./app_go/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.calver }}
      
      - name: Image digest
        run: echo "🐳 Go image pushed successfully with multiple tags!"
