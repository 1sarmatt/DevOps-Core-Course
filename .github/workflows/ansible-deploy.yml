name: Ansible Deployment

on:
  push:
    branches: [ main, master, lab06 ]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [ main, master, lab06 ]
    paths:
      - 'ansible/**'
  workflow_dispatch:

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Create temporary vault password file for linting
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/.vault_pass
          chmod 600 ansible/.vault_pass

      - name: Run ansible-lint
        run: |
          cd ansible
          # Run ansible-lint, but don't fail on warnings
          ansible-lint playbooks/*.yml --force-color || echo "Ansible-lint completed with warnings"
          
          # Run syntax check (this is the critical validation)
          ansible-playbook playbooks/deploy.yml --syntax-check
          ansible-playbook playbooks/provision.yml --syntax-check
          ansible-playbook playbooks/site.yml --syntax-check

      - name: Cleanup vault password file
        if: always()
        run: rm -f ansible/.vault_pass

  deploy:
    name: Deploy Application
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and dependencies
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Create Ansible Vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass
          chmod 600 /tmp/vault_pass

      - name: Deploy with Ansible
        run: |
          cd ansible
          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.ini \
            --vault-password-file /tmp/vault_pass
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/vault_pass
          rm -f ~/.ssh/id_rsa

      - name: Wait for application to start
        run: sleep 15

      - name: Verify Deployment
        run: |
          echo "Verifying application health..."
          curl -f http://${{ secrets.VM_HOST }}:5000/health || exit 1
          echo "✅ Application is healthy!"
          
          echo "Testing main endpoint..."
          curl -f http://${{ secrets.VM_HOST }}:5000/ || exit 1
          echo "✅ Main endpoint is working!"
