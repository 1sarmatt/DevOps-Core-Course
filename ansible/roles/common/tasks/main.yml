---
# Common system setup tasks

- name: Package installation block
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: yes

  rescue:
    - name: Fix broken apt cache
      command: apt-get update --fix-missing
      changed_when: false

    - name: Retry package installation
      apt:
        name: "{{ common_packages }}"
        state: present

  always:
    - name: Log package installation completion
      copy:
        content: "Common packages installed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/ansible_common_packages.log
        mode: '0644'

  become: true
  tags:
    - common
    - packages

- name: System configuration block
  block:
    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

  become: true
  tags:
    - common
    - system
