---
# Docker installation tasks

- name: Docker installation block
  block:
    - name: Remove old Docker versions
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present

  rescue:
    - name: Wait and retry on GPG key failure
      pause:
        seconds: 10

    - name: Retry Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry Docker installation
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes

  always:
    - name: Ensure Docker service is enabled
      service:
        name: docker
        enabled: yes

  become: true
  tags:
    - docker
    - docker_install
  notify: restart docker

- name: Docker configuration block
  block:
    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python3-docker for Ansible docker modules
      apt:
        name: python3-docker
        state: present

  become: true
  tags:
    - docker
    - docker_config
